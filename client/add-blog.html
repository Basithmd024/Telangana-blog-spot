<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add a new blog post about Telangana tourism.">
  <title>Add Blog - Telangana Tourism Blog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top" id="mainNavbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Telangana<span>Blog</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-center gap-1" id="navLinks">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house-door me-1"></i>Home</a></li>
          <li class="nav-item"><a class="nav-link" href="blogs.html"><i class="bi bi-journal-richtext me-1"></i>Blogs</a></li>
          <li class="nav-item" id="navAddBlog" style="display:none;"><a class="nav-link active" href="add-blog.html"><i class="bi bi-plus-circle me-1"></i>Add Blog</a></li>
          <li class="nav-item" id="navAdmin" style="display:none;"><a class="nav-link" href="admin.html"><i class="bi bi-shield-lock me-1"></i>Admin</a></li>
          <li class="nav-item" id="navLogin"><a class="nav-link" href="login.html"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a></li>
          <li class="nav-item" id="navRegister"><a class="nav-link" href="register.html"><i class="bi bi-person-plus me-1"></i>Register</a></li>
          <li class="nav-item" id="navLogout" style="display:none;">
            <a class="nav-link" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
          </li>
          <li class="nav-item" id="navUser" style="display:none;">
            <span class="nav-link" style="color:var(--accent)!important;"><i class="bi bi-person-circle me-1"></i><span id="navUserName"></span></span>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Add Blog Form -->
  <section class="add-blog-wrapper">
    <div class="container">
      <div class="add-blog-card fade-in-up">
        <h2 class="section-title" style="font-size:1.8rem;text-align:left;margin-bottom:0.3rem;">
          <i class="bi bi-pencil-square me-2" style="color:var(--primary);"></i>Create New Blog
        </h2>
        <p style="color:var(--text-secondary);margin-bottom:2rem;">Share your Telangana travel experience with the world</p>

        <form id="addBlogForm" onsubmit="handleAddBlog(event)" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label" for="blogTitle">Blog Title</label>
            <input type="text" class="form-control" id="blogTitle" placeholder="e.g., The Majestic Charminar" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="blogCategory">Category</label>
            <select class="form-select" id="blogCategory" required>
              <option value="">Select a category</option>
              <option value="Historical">Historical</option>
              <option value="Temples">Temples</option>
              <option value="Waterfalls">Waterfalls</option>
              <option value="Culture & Festivals">Culture & Festivals</option>
              <option value="Food Places">Food Places</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label" for="blogDescription">Description</label>
            <textarea class="form-control" id="blogDescription" rows="6" placeholder="Write your travel story here..." required></textarea>
          </div>
          <div class="mb-4">
            <label class="form-label">Upload Image</label>
            <div class="upload-area" onclick="document.getElementById('blogImage').click()">
              <i class="bi bi-cloud-arrow-up" style="font-size:2rem;"></i>
              <p class="mb-0 mt-2">Click to upload an image</p>
              <small style="color:var(--text-muted);">JPG, PNG, GIF, WebP (max 5MB)</small>
              <input type="file" id="blogImage" accept="image/*" style="display:none;" onchange="previewImage(this)">
            </div>
            <img id="imagePreview" src="" class="img-fluid rounded mt-2" style="display:none;max-height:200px;" alt="Preview">
          </div>
          <button type="submit" class="btn-primary-custom w-100" id="addBlogBtn">
            <i class="bi bi-send me-2"></i>Publish Blog
          </button>
        </form>
      </div>
    </div>
  </section>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateNav();
      if (!getToken()) {
        showToast('Please login to add a blog', 'error');
        setTimeout(() => window.location.href = 'login.html', 1500);
      }
    });

    function previewImage(input) {
      const preview = document.getElementById('imagePreview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function handleAddBlog(e) {
      e.preventDefault();
      const btn = document.getElementById('addBlogBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="custom-spinner" style="width:20px;height:20px;display:inline-block;"></span> Publishing...';

      const formData = new FormData();
      formData.append('title', document.getElementById('blogTitle').value);
      formData.append('category', document.getElementById('blogCategory').value);
      formData.append('description', document.getElementById('blogDescription').value);

      const imageFile = document.getElementById('blogImage').files[0];
      if (imageFile) {
        formData.append('image', imageFile);
      }

      try {
        const res = await fetch('/api/blogs', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + getToken()
          },
          body: formData
        });
        const data = await res.json();

        if (!res.ok) {
          showToast(data.message || 'Failed to create blog', 'error');
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-send me-2"></i>Publish Blog';
          return;
        }

        showToast('Blog published successfully!', 'success');
        setTimeout(() => window.location.href = 'blogs.html', 1200);
      } catch (err) {
        showToast('Server error. Please try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send me-2"></i>Publish Blog';
      }
    }
  </script>
</body>
</html>
