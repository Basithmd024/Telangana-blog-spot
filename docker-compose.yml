version: "3.8"
services:
  app:
    build: .
    ports:
      - "5001:5001"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DATABASE=telangana_tourism
      - MYSQL_PORT=3306
      - JWT_SECRET=change_this_secret
      - PORT=5001
    depends_on:
      - mysql
    volumes:
      - ./uploads:/usr/src/app/server/uploads

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=telangana_tourism
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
