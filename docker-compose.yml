version: "3.8"
services:
  app:
    build: .
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/telangana_tourism
      - JWT_SECRET=change_this_secret
      - PORT=5001
    depends_on:
      - mongo
    volumes:
      - ./uploads:/usr/src/app/server/uploads

  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
